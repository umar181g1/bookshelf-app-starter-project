<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookshelf App</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Impor script kamu di sini -->
  <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
  <script defer src="main.js"></script>
</head>

<body>
  <header>
    <h1>Bookshelf App</h1>
  </header>

  <main>
    <section class="add-book">
      <h2>Tambah Buku Baru</h2>
      <form id="bookForm" data-testid="bookForm" class="form">
        <div class="input">
          <label for="bookFormTitle">Judul</label>
          <input id="bookFormTitle" type="text" required data-testid="bookFormTitleInput" />
        </div>
        <div class="input">
          <label for="bookFormAuthor">Penulis</label>
          <input id="bookFormAuthor" type="text" required data-testid="bookFormAuthorInput" />
        </div>
        <div class="input">
          <label for="bookFormYear">Tahun</label>
          <input id="bookFormYear" type="number" required data-testid="bookFormYearInput" />
        </div>
        <div class="input">
          <label for="bookFormIsComplete">Selesai dibaca</label>
          <input id="bookFormIsComplete" type="checkbox" data-testid="bookFormIsCompleteCheckbox" />
        </div>
        <button class="btn-submit" id="bookFormSubmit" type="submit" data-testid="bookFormSubmitButton">
          Tambah Buku
        </button>
      </form>
    </section>

    <section class="search-book">
      <h2>Cari Buku</h2>
      <form id="searchBook" data-testid="searchBookForm" class="formsearch">
        <label for="searchBookTitle">Judul</label>
        <input id="searchBookTitle" type="text" data-testid="searchBookFormTitleInput" />
        <button id="searchSubmit" type="submit" data-testid="searchBookFormSubmitButton">
          Cari
        </button>
      </form>
    </section>

    <section class="incomplete-book">
      <h2>Belum selesai dibaca</h2>

      <div id="incompleteBookList" data-testid="incompleteBookList" class="form">
        <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
        <div data-bookid={{ id }} data-testid="bookItem">
          <h3 data-testid="bookItemTitle">{{ title }}</h3>
          <p data-testid="bookItemAuthor">Penulis: {{ author }}</p>
          <p data-testid="bookItemYear">Tahun: {{ year }}</p>
          <div>
            <button class="is-complete-button" data-testid="bookItemIsCompleteButton">Selesai dibaca</button>
            <button class="delete-button" data-testid="bookItemDeleteButton">Hapus Buku</button>
            <button class="edit-button" data-testid="bookItemEditButton">Edit Buku</button>
          </div>
        </div>
      </div>
    </section>

    <section class="complete-book">
      <h2>Selesai dibaca</h2>

      <div id="completeBookList" data-testid="completeBookList" class="form">
        <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
        <div data-bookid={{ id }} data-testid="bookItem">
          <h3 data-testid="bookItemTitle">{{ title }}</h3>
          <p data-testid="bookItemAuthor">Penulis: {{ author }}</p>
          <p data-testid="bookItemYear">Tahun: {{ year }}</p>
          <div>
            <button class="is-complete-button" data-testid="bookItemIsCompleteButton">Belum selesai dibaca</button>
            <button class="delete-button" data-testid="bookItemDeleteButton">Hapus Buku</button>
            <button class="edit-button" data-testid="bookItemEditButton">Edit Buku</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
